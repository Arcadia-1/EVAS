name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build wheel
      - name: Build pure Python distribution
        run: EVAS_SKIP_RUST_CORE_BUILD=1 python -m build --sdist --wheel --outdir dist
      - name: Build manylinux evas-rust wheel
        run: |
          docker run --rm -v "$PWD":/io -w /io quay.io/pypa/manylinux2014_x86_64 /bin/bash -lc '
            set -euo pipefail
            curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            source "$HOME/.cargo/env"
            /opt/python/cp312-cp312/bin/python -m pip install build wheel
            EVAS_RUST_WHEEL_PLATFORM_TAG=manylinux2014_x86_64 /opt/python/cp312-cp312/bin/python -m build --wheel --outdir dist
          '
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
